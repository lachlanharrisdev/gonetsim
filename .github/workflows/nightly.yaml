name: Nightly

on:
  schedule:
    - cron: '0 2 * * *' # Runs at 02:00 UTC every night
  workflow_dispatch:

permissions:
  contents: read
  packages: write


jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new commits in the last 24h
        id: check
        uses: adriangl/check-new-commits-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          seconds: 86400 # 24 hours

      - name: Checkout code
        if: steps.check.outputs.has-new-commits == 'true'
        uses: actions/checkout@v6

      - name: Set build metadata
        if: steps.check.outputs.has-new-commits == 'true'
        id: meta
        shell: bash
        run: |
          date="$(date -u +'%Y%m%d')"
          echo "date=${date}" >> "$GITHUB_OUTPUT"
          echo "version=nightly-${date}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.check.outputs.has-new-commits == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.has-new-commits == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: steps.check.outputs.has-new-commits == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.check.outputs.has-new-commits == 'true'
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/gonetsim
          tags: |
            type=raw,value=nightly
            type=raw,value=nightly-${{ steps.meta.outputs.date }}

      - name: Build and push image
        if: steps.check.outputs.has-new-commits == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
