name: Nightly

on:
  schedule:
    - cron: '0 2 * * *' # Runs at 02:00 UTC every night
  workflow_dispatch:

permissions:
  contents: read
  packages: write


jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check for new commits in the last 24h
        id: check
        uses: adriangl/check-new-commits-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          seconds: 86400 # 24 hours

      - name: Checkout code
        if: steps.check.outputs.has-new-commits == 'true'
        uses: actions/checkout@v6

      - name: Install Go
        if: steps.check.outputs.has-new-commits == 'true'
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Download Go modules
        if: ${{ steps.check.outputs.has-new-commits == 'true' && steps.setup-go.outputs.cache-hit != 'true' }}
        shell: bash
        run: go mod download

      - name: Install ko
        if: steps.check.outputs.has-new-commits == 'true'
        run: go install github.com/google/ko@v0.18.1

      - name: Set build metadata
        if: steps.check.outputs.has-new-commits == 'true'
        id: meta
        shell: bash
        run: |
          date="$(date -u +'%Y%m%d')"
          echo "date=${date}" >> "$GITHUB_OUTPUT"
          echo "version=nightly-${date}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.check.outputs.has-new-commits == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (ko)
        if: steps.check.outputs.has-new-commits == 'true'
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/gonetsim
          VERSION: ${{ steps.meta.outputs.version }}
          REVISION: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        shell: bash
        run: |
          ko build \
            --bare \
            --platform=linux/amd64,linux/arm64 \
            --image-user=0:0 \
            --tags=nightly,nightly-${{ steps.meta.outputs.date }} \
            .
