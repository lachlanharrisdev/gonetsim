name: ci
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'README.md'

permissions:
  contents: read
  packages: write

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest]
    name: golangci-lint
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, ubuntu-24.04-arm]
    name: test
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Download Go modules
        shell: bash
        if: ${{ steps.setup-go.outputs.cache-hit != 'true' }}
        run: go mod download
      - name: go build
        run: go build
      - name: go test
        run: go test -v ./... -race

  container:
    name: container-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Download Go modules
        shell: bash
        if: ${{ steps.setup-go.outputs.cache-hit != 'true' }}
        run: go mod download

      - name: Install ko
        run: go install github.com/google/ko@v0.18.1

      - name: Set build metadata
        id: meta
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && -n "${PR_NUMBER}" ]]; then
            version="pr-${PR_NUMBER}-${short_sha}"
          else
            version="${GITHUB_REF_NAME}-${short_sha}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build container image (ko)
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/gonetsim
          VERSION: ${{ steps.meta.outputs.version }}
          REVISION: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
        shell: bash
        run: |
          ko build \
            --bare \
            --platform=linux/amd64,linux/arm64 \
            --push=false \
            --image-user=0:0 \
            --tags=main,latest,sha-${GITHUB_SHA} \
            .
