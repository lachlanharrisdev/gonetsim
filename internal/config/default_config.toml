# `gonetsim` configuration file
#
# This file is generated automatically the first time you run `gonetsim` if no
# configuration file is found
#
# You can place it in one of the following locations, in order of precedence:
#   Linux:
#     - /etc/gonetsim/gonetsim.toml
#     - $XDG_CONFIG_HOME/gonetsim/config.toml (usually ~/.config/gonetsim/config.toml)
#     - ./gonetsim.toml
#   Windows:
#     - %APPDATA%\gonetsim\config.toml
#     - ./gonetsim.toml
# Or specify an explicit path with:
#   gonetsim --config /path/to/gonetsim.toml

[general]
# How long to wait for servers to shut down after receiving SIGINT/SIGTERM.
shutdown_timeout = "2s"

[dns]
enabled = true
listen = ":5353"
network = "udp"
# Sinkhole IP for A responses.
ipv4 = "127.0.0.1"
# Optional sinkhole IP for AAAA responses. Set empty string to disable.
ipv6 = "::1"
# Sinkhole domain for CNAME, MX & PTR responses
domain = "localhost"
# TXT record for TXT DNS responses
txt = "TXT record response from GoNetSim"
# TTL in seconds for DNS responses
ttl = 60
# Enable DNS message compression
compress = false

[http]
enabled = true
listen = ":8080"
# Status code to return for all requests. 0 means default (200).
status = 200

[https]
enabled = true
listen = ":8443"
# Status code to return for all requests. 0 means default (200).
status = 200

[smtp]
enabled = true
addr = ":1025"
domain = "localhost"
write_timeout = 10
read_timeout = 10
max_message_bytes = 1048576
max_recipients = 50
require_auth = false
allow_insecure_auth = true

[smtps]
enabled = true
addr = ":1465"
domain = "localhost"
write_timeout = 10
read_timeout = 10
max_message_bytes = 1048576
max_recipients = 50
require_auth = false
allow_insecure_auth = false
cert = ""
key = ""

[logging]
# Log output format: "text" (fixed-width columns) or "json".
format = "text"
# Minimum log level: "debug", "info", "warn", "error".
level = "info"
